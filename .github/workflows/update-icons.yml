name: Update Icons

on:
  # 毎週月曜日 日本時間 6:00（UTC 21:00 日曜日）に自動実行
  schedule:
    - cron: '0 21 * * 0'
  # 手動でも実行できる
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Fetch latest icon URLs
        run: node scripts/fetch_icons.js

      - name: Download icons locally
        run: node scripts/download_icons.js

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/icons/ public/members.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update member icons [skip ci]"
            git push
          fi

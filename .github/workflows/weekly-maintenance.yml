name: Weekly Maintenance

on:
  schedule:
    - cron: '0 20 * * 0' # 日本時間 月曜 05:00 (UTC 日曜 20:00)
  workflow_dispatch:      # 手動実行可能

jobs:
  maintenance:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.ACTIONS_PAT || github.token }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Update Subscribers & Featured Videos
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: |
          node scripts/update_subscribers.js
          node scripts/update_recommendations_api.js

      - name: Fetch Latest YouTube Icons
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: node scripts/fetch_icons.js

      - name: Download Icons to Local
        run: node scripts/download_icons.js

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add icons/ members.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: weekly maintenance (icons & featured videos) [skip ci]"
            git push
          fi

name: Update Subscribers

on:
  # 毎日 日本時間 9:00（UTC 0:00）に自動実行
  schedule:
    - cron: '0 0 * * *'
  # 手動でも実行できる
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # members.json をコミット・プッシュするために必要

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.ACTIONS_PAT || github.token }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Update subscriber counts
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: node scripts/update_subscribers.js

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add members.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update subscriber counts [skip ci]"
            git push
          fi
